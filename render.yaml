# Render Blueprint — Maintenance Frontend (Static Site)
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: maintenance-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    region: oregon

    envVars:
      # Must match the deployed backend service name on Render
      - key: VITE_API_URL
        value: https://maintenance-backend-1cj1.onrender.com

    # SPA fallback — all unknown paths serve index.html for React Router
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
